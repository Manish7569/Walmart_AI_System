apiVersion: apps/v1
kind: Deployment
metadata:
  name: walmart-ai-frontend
  namespace: walmart-ai
  labels: { app: walmart-ai-frontend, version: v2.0.0 }
spec:
  replicas: 2
  selector:
    matchLabels: { app: walmart-ai-frontend }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: walmart-ai-frontend }
    spec:
      containers:
        - name: frontend
          image: ECR_REGISTRY/walmart-ai-frontend:latest
          ports: [{ containerPort: 8501 }]
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits:   { cpu: 2000m, memory: 4Gi }
          readinessProbe:
            httpGet: { path: /, port: 8501 }
            initialDelaySeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: walmart-ai-frontend
  namespace: walmart-ai
spec:
  selector: { app: walmart-ai-frontend }
  ports: [{ port: 80, targetPort: 8501 }]
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: walmart-ai-frontend-hpa
  namespace: walmart-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: walmart-ai-frontend
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
